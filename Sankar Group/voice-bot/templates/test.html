<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Bot API Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f4f4f4;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            background: #eee;
            border-radius: 8px;
            min-height: 50px;
            white-space: pre-wrap;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Voice Bot API Tester</h2>

    <input
        type="text"
        id="textInput"
        placeholder="Type message..."
        value="hello"
    >

    <button onclick="sendMessage()">
        Send
    </button>

    <div id="status"></div>

    <div id="output">
        Waiting...
    </div>

</div>

<script>

async function sendMessage() {

    const text =
        document.getElementById("textInput").value;

    const output =
        document.getElementById("output");

    const status =
        document.getElementById("status");

    output.innerText = "Sending request...";
    status.innerText = "";

    try {

        console.log("Sending:", text);

        const res = await fetch(
            'http://127.0.0.1:5000/respond',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text
                })
            }
        );

        console.log("STATUS:", res.status);

        const data = await res.json();

        console.log("RESPONSE:", data);

        if (!res.ok) {
            throw new Error(
                data.error || "Unknown error"
            );
        }

        output.innerText =
            "Bot Response:\n\n" +
            data.response;

        status.innerText =
            "API Request Successful";

        // Play audio
        const audio =
            new Audio(
                "http://127.0.0.1:5000" +
                data.audio_url
            );

        audio.play();

    }
    catch (err) {

        console.error("ERROR:", err);

        status.innerText = "Request Failed";

        output.innerText =
            "ERROR:\n\n" + err.message;
    }
}

</script>

</body>
</html>
