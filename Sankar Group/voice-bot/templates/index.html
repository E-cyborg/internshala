<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Hindi + Telugu Voice Bot
  </title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family:
        'Segoe UI',
        sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f0c29,
          #302b63,
          #24243e
        );

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      padding: 20px;
    }

    .container {

      width: 100%;
      max-width: 720px;

      background:
        rgba(255,255,255,0.05);

      backdrop-filter: blur(10px);

      border-radius: 24px;

      overflow: hidden;

      border:
        1px solid rgba(255,255,255,0.1);

      box-shadow:
        0 20px 50px rgba(0,0,0,0.5);
    }

    .header {

      padding: 24px;

      text-align: center;

      background:
        linear-gradient(
          90deg,
          #6c63ff,
          #3ecf8e
        );
    }

    .header h1 {

      color: white;

      font-size: 1.5rem;
    }

    .header p {

      color:
        rgba(255,255,255,0.8);

      margin-top: 6px;

      font-size: 0.9rem;
    }

    .chat-box {

      height: 420px;

      overflow-y: auto;

      padding: 20px;

      display: flex;

      flex-direction: column;

      gap: 14px;
    }

    .chat-box::-webkit-scrollbar {
      width: 4px;
    }

    .chat-box::-webkit-scrollbar-thumb {

      background:
        rgba(255,255,255,0.2);

      border-radius: 4px;
    }

    .message {

      max-width: 80%;

      padding: 14px 16px;

      border-radius: 16px;

      line-height: 1.5;

      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user-msg {

      align-self: flex-end;

      background:
        linear-gradient(
          135deg,
          #6c63ff,
          #8b5cf6
        );

      color: white;

      border-bottom-right-radius: 4px;
    }

    .bot-msg {

      align-self: flex-start;

      background:
        rgba(255,255,255,0.08);

      color: #f1f1f1;

      border:
        1px solid rgba(255,255,255,0.1);

      border-bottom-left-radius: 4px;
    }

    .controls {

      padding: 20px;

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 16px;
    }

    .mic-btn {

      width: 72px;
      height: 72px;

      border-radius: 50%;

      border: none;

      cursor: pointer;

      font-size: 1.8rem;

      color: white;

      background:
        linear-gradient(
          135deg,
          #6c63ff,
          #3ecf8e
        );

      transition: 0.3s;

      box-shadow:
        0 8px 20px rgba(108,99,255,0.4);
    }

    .mic-btn:hover {
      transform: scale(1.08);
    }

    .mic-btn.recording {

      background:
        linear-gradient(
          135deg,
          #ff4444,
          #ff6b6b
        );

      animation:
        pulse 1s infinite;
    }

    @keyframes pulse {

      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    .status {

      color:
        rgba(255,255,255,0.7);

      font-size: 0.9rem;
    }

    .transcript {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      background:
        rgba(255,255,255,0.05);

      color: #3ecf8e;

      min-height: 52px;

      border:
        1px solid rgba(255,255,255,0.08);

      font-style: italic;
    }

    .logs-btn {

      margin: 0 20px 20px;

      width: calc(100% - 40px);

      padding: 12px;

      border: none;

      border-radius: 12px;

      background:
        rgba(255,255,255,0.08);

      color: white;

      cursor: pointer;

      transition: 0.2s;
    }

    .logs-btn:hover {

      background:
        rgba(255,255,255,0.15);
    }

    .empty-state {

      margin: auto;

      text-align: center;

      color:
        rgba(255,255,255,0.35);

      line-height: 1.6;
    }

    @media(max-width: 600px) {

      .message {
        max-width: 92%;
      }

      .chat-box {
        height: 350px;
      }
    }

  </style>

</head>

<body>

<div class="container">

  <div class="header">

    <h1>
      🎤 Hindi + Telugu Voice Bot
    </h1>

    <p>
      Speak naturally in Hindi + Telugu mixed language
    </p>

  </div>


  <div
    class="chat-box"
    id="chatBox"
  >

    <div class="empty-state">

      Press microphone and start speaking

      <br><br>

      Example:
      <br>

      “Namaste, naa peru Raju”

    </div>

  </div>


  <div class="controls">

    <button
      class="mic-btn"
      id="micBtn"
    >
      🎤
    </button>

    <div
      class="status"
      id="status"
    >
      Click microphone to speak
    </div>

    <div
      class="transcript"
      id="transcript"
    >
      Live transcript appears here...
    </div>

  </div>


  <button
    class="logs-btn"
    onclick="downloadLogs()"
  >
    📋 Download Conversation Logs
  </button>

</div>


<script>

let recognition;

let isRecording = false;

const micBtn =
  document.getElementById(
    'micBtn'
  );

const status =
  document.getElementById(
    'status'
  );

const transcript =
  document.getElementById(
    'transcript'
  );

const chatBox =
  document.getElementById(
    'chatBox'
  );


// --------------------
// Speech Recognition
// --------------------

if (
  'webkitSpeechRecognition'
  in window
) {

  recognition =
    new webkitSpeechRecognition();

}
else if (
  'SpeechRecognition'
  in window
) {

  recognition =
    new SpeechRecognition();

}
else {

  alert(
    'Speech Recognition not supported'
  );
}


if (recognition) {

  recognition.continuous =
    false;

  recognition.interimResults =
    true;

  recognition.lang =
    'hi-IN';


  recognition.onstart = () => {

    isRecording = true;

    micBtn.classList.add(
      'recording'
    );

    micBtn.textContent = '⏹';

    status.textContent =
      'Listening...';

    transcript.textContent =
      'Listening...';
  };


  recognition.onresult = (event) => {

    let interim = '';

    let final = '';

    for (
      let i = event.resultIndex;
      i < event.results.length;
      i++
    ) {

      const text =
        event.results[i][0]
        .transcript;

      if (
        event.results[i].isFinal
      ) {

        final += text;

      } else {

        interim += text;
      }
    }

    transcript.textContent =
      final || interim;


    if (final) {

      sendToBot(final);
    }
  };


  recognition.onerror = (e) => {

    console.error(
      'Speech Error:',
      e
    );

    resetMic();

    transcript.textContent =
      'Speech Error: ' +
      e.error;
  };


  recognition.onend = () => {

    resetMic();
  };
}


// --------------------
// Mic Button
// --------------------

micBtn.onclick = () => {

  if (!recognition)
    return;

  if (isRecording) {

    recognition.stop();

  } else {

    recognition.start();
  }
};


// --------------------
// Reset Mic
// --------------------

function resetMic() {

  isRecording = false;

  micBtn.classList.remove(
    'recording'
  );

  micBtn.textContent = '🎤';

  status.textContent =
    'Click microphone to speak';
}


// --------------------
// Add Message
// --------------------

function addMessage(
  text,
  type
) {

  const empty =
    document.querySelector(
      '.empty-state'
    );

  if (empty)
    empty.remove();

  const div =
    document.createElement('div');

  div.className =
    `message ${type}-msg`;

  div.textContent = text;

  chatBox.appendChild(div);

  chatBox.scrollTop =
    chatBox.scrollHeight;
}


// --------------------
// Send To Backend
// --------------------

async function sendToBot(text) {

  addMessage(
    text,
    'user'
  );

  status.textContent =
    'Processing...';

  try {

    const res =
      await fetch('/respond', {

        method: 'POST',

        headers: {
          'Content-Type':
            'application/json'
        },

        body:
          JSON.stringify({
            text: text
          })
      });

    const data =
      await res.json();

    if (!res.ok) {

      throw new Error(
        data.error ||
        'Server Error'
      );
    }

    addMessage(
      data.response,
      'bot'
    );

    speakResponse(
      data.response
    );

  }
  catch (err) {

    console.error(err);

    addMessage(
      'Something went wrong.',
      'bot'
    );
  }

  status.textContent =
    'Click microphone to speak';
}


// --------------------
// TTS
// --------------------

function speakResponse(text) {

  speechSynthesis.cancel();

  const utter =
    new SpeechSynthesisUtterance(
      text
    );

  utter.lang = 'hi-IN';

  utter.rate = 1;

  utter.pitch = 1;

  speechSynthesis.speak(
    utter
  );
}


// --------------------
// Download Logs
// --------------------

async function downloadLogs() {

  const res =
    await fetch('/logs');

  const logs =
    await res.json();

  if (!logs.length) {

    alert(
      'No conversation logs yet.'
    );

    return;
  }

  const text = logs.map(

    l =>

`[${l.timestamp}]

User: ${l.user}

Bot: ${l.bot}`

  ).join('\n\n');


  const blob =
    new Blob(
      [text],
      {
        type: 'text/plain'
      }
    );

  const a =
    document.createElement('a');

  a.href =
    URL.createObjectURL(blob);

  a.download =
    'conversation_logs.txt';

  a.click();
}

</script>

</body>
</html>
